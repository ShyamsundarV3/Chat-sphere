# Netlify Build Configuration
[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

# API proxy to Render backend
# Replace YOUR_RENDER_BACKEND_URL with your actual Render URL
# Example: https://chatsphere-api.onrender.com
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
